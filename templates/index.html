<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Student Tutor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">AI</div>
        <div>
          <h2>Student Tutor</h2>
          <p>Powered by LM Studio</p>
        </div>
      </div>

      <div class="panel">
        <h3>Quick Topics</h3>
        <div class="topic-list">
          <button class="topic-btn" data-topic="Explain Python loops with examples">Python</button>
          <button class="topic-btn" data-topic="Teach me SQL joins in simple words">SQL</button>
          <button class="topic-btn" data-topic="Explain machine learning for beginners">Machine Learning</button>
          <button class="topic-btn" data-topic="Help me understand statistics basics">Statistics</button>
        </div>
      </div>

      <div class="panel">
        <h3>Status</h3>
        <div class="status-panel">
          <span id="statusBadge" class="badge offline">Offline</span>
          <p id="modelText">Model: Not loaded</p>
        </div>
      </div>

      <div class="panel">
        <h3>Actions</h3>
        <button id="clearBtn" class="clear-btn">Clear Conversation</button>
      </div>
    </aside>

    <main class="main-chat">
      <header class="chat-header">
        <div>
          <h1>AI Student Tutor</h1>
          <p>Ask study questions and learn step by step.</p>
        </div>
      </header>

      <section id="chatBox" class="chat-box">
        <div class="message bot">
          <div class="avatar bot-avatar">T</div>
          <div class="bubble-wrap">
            <div class="sender-name">Tutor</div>
            <div class="bubble">
              Hello! I am your AI Student Tutor. Ask me about Python, SQL, machine learning, statistics, or any study topic.
            </div>
          </div>
        </div>
      </section>

      <p id="typingText" class="typing-text"></p>

      <form id="chatForm" class="chat-input-area">
        <textarea
          id="userInput"
          placeholder="Type your question here..."
          rows="1"
          required
        ></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
